name: Deploy frontend preview

on:
  pull_request:
    paths:
      - 'apps/frontend/**/*'
      - 'packages/ui/**/*'
      - 'packages/utils/**/*'
      - 'packages/assets/**/*'
      - '**/wrangler.jsonc'
      - '**/pnpm-*.yaml'
      - '.github/workflows/frontend-preview.yml'

jobs:
  deploy:
    if: github.repository_owner == 'modrinth' && github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/frontend-deploy.yml
    secrets: inherit
    strategy:
      matrix:
        environment: [staging-preview, production-preview]
    with:
      environment: ${{ matrix.environment }}

  comment:
    if: github.repository_owner == 'modrinth' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      pull-requests: write
    steps:
      - name: 📥 Check out code
        uses: actions/checkout@v4

      - name: 📥 Download deployment URLs
        uses: actions/download-artifact@v7
        with:
          pattern: deployment-url-*
          merge-multiple: true

      - name: 📖 Read deployment URLs
        id: urls
        run: |
          STAGING=$(cat deployment-url-staging-preview.txt)
          PRODUCTION=$(cat deployment-url-production-preview.txt)
          echo "staging=$STAGING" >> $GITHUB_OUTPUT
          echo "production=$PRODUCTION" >> $GITHUB_OUTPUT

      - name: 💬 Update PR Health
        uses: ./.github/actions/pr-health-comment
        with:
          section: deploy
          content: "🔗 [staging](${{ steps.urls.outputs.staging }}) · 🔗 [production](${{ steps.urls.outputs.production }})"
          github-token: ${{ secrets.GITHUB_TOKEN }}
