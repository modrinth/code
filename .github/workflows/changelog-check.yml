name: Changelog Check

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  check:
    name: Check for changelog
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: 📥 Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Check for changelog fragments
        id: changelog
        run: |
          CHANGED_FILES=$(git diff --name-only --diff-filter=A origin/${{ github.event.pull_request.base.ref }}...HEAD -- '.github/changelog/*.yml')
          if [ -z "$CHANGED_FILES" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: 💬 Update PR Health (changelog found)
        if: steps.changelog.outputs.found == 'true'
        uses: ./.github/actions/pr-health-comment
        with:
          section: changelog
          content: |
            **Changelog**
            ✅ A changelog fragment was added to this pull request.
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 💬 Update PR Health (no changelog)
        if: steps.changelog.outputs.found == 'false'
        uses: ./.github/actions/pr-health-comment
        with:
          section: changelog
          content: |
            **Changelog**
            ⚠️ No changelog fragment was found for this pull request. If this includes user-facing changes, create one:
            ```
            pnpm changelog <platform|app|hosting> "description"
            ```
          github-token: ${{ secrets.GITHUB_TOKEN }}
